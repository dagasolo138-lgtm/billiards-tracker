<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>台球训练打卡</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b0f14;
      --bg-soft: #111720;
      --card: #141b24;
      --card-2: #18212c;
      --border: rgba(255,255,255,0.08);
      --text: #edf2f7;
      --muted: #8da0b6;
      --accent: #4fd1c5;
      --accent-2: #22c55e;
      --warn: #f59e0b;
      --danger: #f87171;
      --shadow: 0 12px 32px rgba(0,0,0,0.28);
      --radius: 18px;
      --nav-h: 72px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      background: radial-gradient(circle at top, #131d28 0%, var(--bg) 42%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      min-height: 100%;
    }

    button, input, select {
      font: inherit;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .shell {
      width: 100%;
      max-width: 560px;
      min-height: 100dvh;
      position: relative;
      padding: env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + var(--nav-h) + 20px);
    }

    .hero {
      padding: 14px 4px 20px;
    }

    .hero h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.15;
      letter-spacing: 0.01em;
    }

    .hero p {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0)), var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      box-shadow: var(--shadow);
      margin-bottom: 14px;
    }

    .card.compact { padding: 14px; }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .stack {
      display: grid;
      gap: 12px;
    }

    .muted { color: var(--muted); }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 0 11px;
      border-radius: 999px;
      background: rgba(79, 209, 197, 0.12);
      color: var(--accent);
      border: 1px solid rgba(79, 209, 197, 0.18);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .badge.warn {
      color: #fbbf24;
      background: rgba(251,191,36,0.10);
      border-color: rgba(251,191,36,0.18);
    }

    .badge.danger {
      color: #fca5a5;
      background: rgba(248,113,113,0.10);
      border-color: rgba(248,113,113,0.18);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .stat {
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 8px;
    }

    .stat .value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .field {
      display: grid;
      gap: 8px;
    }

    .label {
      color: var(--text);
      font-size: 14px;
      font-weight: 700;
    }

    .hint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .input, .select {
      width: 100%;
      min-height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 0 14px;
      outline: none;
    }

    .input:focus, .select:focus {
      border-color: rgba(79, 209, 197, 0.45);
      box-shadow: 0 0 0 3px rgba(79, 209, 197, 0.12);
    }

    .segmented {
      display: grid;
      gap: 10px;
    }

    .segment-option {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px;
      background: rgba(255,255,255,0.02);
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .segment-option.active {
      border-color: rgba(79,209,197,0.42);
      background: rgba(79,209,197,0.08);
    }

    .segment-option .radio-dot {
      width: 18px;
      height: 18px;
      flex: 0 0 18px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.35);
      margin-top: 2px;
      position: relative;
    }

    .segment-option.active .radio-dot {
      border-color: var(--accent);
    }

    .segment-option.active .radio-dot::after {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: 50%;
      background: var(--accent);
    }

    .actions-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 12px;
      line-height: 1.1;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .score-box {
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 12px;
      display: grid;
      gap: 8px;
    }

    .score-box input {
      height: 44px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 0 12px;
      width: 100%;
      outline: none;
    }

    .score-input-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px;
      gap: 8px;
      align-items: center;
    }

    .mic-btn {
      width: 44px;
      height: 44px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
    }

    .mic-btn.active {
      border-color: rgba(79,209,197,0.6);
      background: rgba(79,209,197,0.12);
    }

    .btn {
      min-height: 48px;
      border: none;
      border-radius: 14px;
      padding: 0 16px;
      color: #041013;
      background: linear-gradient(135deg, var(--accent), #93f6d9);
      font-weight: 800;
      letter-spacing: 0.01em;
      cursor: pointer;
    }

    .btn:active { transform: translateY(1px); }

    .btn.secondary {
      background: rgba(255,255,255,0.06);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn.ghost {
      background: transparent;
      color: var(--muted);
      border: 1px dashed var(--border);
    }

    .btn.danger {
      color: #fff;
      background: linear-gradient(135deg, #ef4444, #f87171);
    }

    .feedback {
      padding: 14px;
      border-radius: 16px;
      background: rgba(79,209,197,0.08);
      border: 1px solid rgba(79,209,197,0.16);
      line-height: 1.6;
      font-size: 14px;
    }

    .feedback strong {
      display: block;
      margin-bottom: 8px;
    }

    .record-list {
      display: grid;
      gap: 12px;
    }

    .record-item {
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 14px;
      display: grid;
      gap: 12px;
    }

    .record-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .record-title {
      margin: 0;
      font-size: 16px;
      line-height: 1.35;
    }

    .record-time {
      margin-top: 6px;
      font-size: 12px;
      color: var(--muted);
    }

    .score-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .score-pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      padding: 0 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      font-weight: 700;
      font-size: 13px;
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 13px;
    }

    .empty {
      padding: 24px 16px;
      border-radius: 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,0.02);
      border: 1px dashed var(--border);
      line-height: 1.7;
    }

    .nav {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: calc(env(safe-area-inset-bottom) + 10px);
      width: calc(100% - 24px);
      max-width: 528px;
      background: rgba(13,18,24,0.92);
      border: 1px solid var(--border);
      border-radius: 22px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px;
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      z-index: 30;
    }

    .nav button {
      min-height: 52px;
      border: none;
      border-radius: 16px;
      background: transparent;
      color: var(--muted);
      display: grid;
      gap: 4px;
      place-items: center;
      cursor: pointer;
      font-size: 12px;
      font-weight: 700;
    }

    .nav button.active {
      background: rgba(79,209,197,0.12);
      color: var(--accent);
    }

    .nav .icon {
      font-size: 18px;
      line-height: 1;
    }

    .modal-mask {
      position: fixed;
      inset: 0;
      background: rgba(3,8,13,0.72);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
      z-index: 60;
      backdrop-filter: blur(8px);
    }

    .modal-mask.show { display: flex; }

    .modal {
      width: 100%;
      max-width: 520px;
      background: linear-gradient(180deg, rgba(255,255,255,0.025), rgba(255,255,255,0)), var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow);
      max-height: calc(100dvh - 36px);
      overflow: auto;
    }

    .modal h2 {
      margin: 0 0 8px;
      font-size: 22px;
    }

    .modal p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
      font-size: 14px;
    }

    .toast-wrap {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      top: calc(env(safe-area-inset-top) + 16px);
      width: calc(100% - 24px);
      max-width: 528px;
      z-index: 80;
      pointer-events: none;
    }

    .toast {
      background: rgba(15, 23, 32, 0.96);
      border: 1px solid rgba(79,209,197,0.28);
      color: var(--text);
      border-radius: 16px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
      line-height: 1.5;
      opacity: 0;
      transform: translateY(-8px);
      transition: .25s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .note {
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px dashed rgba(79,209,197,0.22);
      background: rgba(79,209,197,0.05);
      font-size: 13px;
      line-height: 1.6;
      color: var(--muted);
    }

    .link-btn {
      border: none;
      background: transparent;
      color: var(--accent);
      font-weight: 700;
      padding: 0;
      cursor: pointer;
    }

    .hidden { display: none !important; }

    @media (max-width: 390px) {
      .score-grid, .grid-2 { grid-template-columns: 1fr; }
      .hero h1 { font-size: 26px; }
    }
  </style>
</head>
<body>
  <div class="shell" id="appShell">
    <div class="toast-wrap"><div class="toast" id="toast"></div></div>

    <section class="hero">
      <div class="row" style="align-items:flex-start;">
        <div>
          <h1>台球训练打卡</h1>
          <p id="heroSubtitle">手机端优先，数据只存本地。别问云同步，今天先把球打进。</p>
        </div>
        <span class="badge" id="heroTierBadge">未注册</span>
      </div>
    </section>

    <main>
      <section class="tab-panel active" id="tab-checkin"></section>
      <section class="tab-panel" id="tab-records"></section>
      <section class="tab-panel" id="tab-settings"></section>
    </main>
  </div>

  <nav class="nav hidden" id="bottomNav">
    <button data-tab="checkin" class="active"><span class="icon">🎱</span><span>打卡</span></button>
    <button data-tab="records"><span class="icon">🧾</span><span>记录</span></button>
    <button data-tab="settings"><span class="icon">⚙️</span><span>设置</span></button>
  </nav>

  <div class="modal-mask" id="modalMask">
    <div class="modal" id="modalContent"></div>
  </div>

  <script>
    (() => {
      const STORAGE_KEY = 'billiard-training-punch-v1';
      const APP_TITLE = '台球训练打卡';
      const ACTIONS = {
        1: [
          { id: 'three_point_straight', name: '三分点直打' },
          { id: 'straight_with_follow', name: '直打中带球' }
        ],
        2: [
          { id: 'five_point_line', name: '五分点直线球' },
          { id: 'soft_push', name: '小力推球训练' },
          { id: 'rail_ball', name: '贴库球专项' },
          { id: 'k_ball', name: 'K球练习' }
        ],
        3: [
          { id: 'five_point_line', name: '五分点直线球' },
          { id: 'soft_push', name: '小力推球训练' },
          { id: 'rail_ball', name: '贴库球专项' },
          { id: 'k_ball', name: 'K球练习' }
        ]
      };

      const FEEDBACKS = [
        { min: 15, max: 15, text: '今天开光了还是杆子开光了？再来一组。' },
        { min: 10, max: 14.999, text: '还行，但别飘，进球不是靠运气的。' },
        { min: 7, max: 9.999, text: '五五开哥，今天袋口决定进不进的？' },
        { min: 4, max: 6.999, text: '这都能打2个进，你是怕伤到球吗？' },
        { min: 0, max: 3.999, text: '建议今天早点回家，球在保护你。' }
      ];

      const state = loadState();
      let transient = {
        checkinResult: null,
        scoreDrafts: []
      };

      const els = {
        heroBadge: document.getElementById('heroTierBadge'),
        heroSubtitle: document.getElementById('heroSubtitle'),
        checkin: document.getElementById('tab-checkin'),
        records: document.getElementById('tab-records'),
        settings: document.getElementById('tab-settings'),
        nav: document.getElementById('bottomNav'),
        modalMask: document.getElementById('modalMask'),
        modalContent: document.getElementById('modalContent'),
        toast: document.getElementById('toast')
      };

      bindNav();
      boot();

      function loadState() {
        try {
          const raw = localStorage.getItem(STORAGE_KEY);
          if (!raw) return getDefaultState();
          const parsed = JSON.parse(raw);
          return {
            profile: parsed.profile || null,
            records: Array.isArray(parsed.records) ? parsed.records : [],
            ui: parsed.ui || { tab: 'checkin' }
          };
        } catch (err) {
          return getDefaultState();
        }
      }

      function getDefaultState() {
        return {
          profile: null,
          records: [],
          ui: { tab: 'checkin' }
        };
      }

      function saveState() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function boot() {
        if (!state.profile) {
          renderEmptyShell();
          openRegisterModal();
          return;
        }

        els.nav.classList.remove('hidden');
        renderAll();
        switchTab(state.ui.tab || 'checkin');
        maybePromptTier3();
      }

      function renderEmptyShell() {
        els.heroBadge.textContent = '未注册';
        els.heroSubtitle.textContent = '先选档位再开练。数据只存在 localStorage，本机清缓存就没了。';
        els.checkin.innerHTML = '';
        els.records.innerHTML = '';
        els.settings.innerHTML = '';
        els.nav.classList.add('hidden');
      }

      function renderAll() {
        renderHero();
        renderCheckin();
        renderRecords();
        renderSettings();
      }

      function renderHero() {
        const profile = state.profile;
        els.heroBadge.textContent = `当前：${tierName(profile.currentTier)}`;
        const stats = computeStats(state.records);
        const streak = computeTier3Progress(state.records).streak;
        const todayCount = state.records.filter(r => localDateKey(r.createdAt) === localDateKey(new Date())).length;
        els.heroSubtitle.textContent = `${profile.nickname}，今天已打卡 ${todayCount} 次，当前连续 ${streak} 天，总组数 ${stats.totalGroups}。`;
      }

      function renderCheckin() {
        const profile = state.profile;
        const actions = getAvailableActions(profile.currentTier);
        const selectedAction = transient.selectedAction && actions.some(a => a.id === transient.selectedAction)
          ? transient.selectedAction
          : actions[0]?.id || '';
        transient.selectedAction = selectedAction;

        const groupCount = Math.max(1, Number(transient.groupCount || 1));
        transient.groupCount = groupCount;
        if (!Array.isArray(transient.scoreDrafts) || transient.scoreDrafts.length !== groupCount) {
          transient.scoreDrafts = Array.from({ length: groupCount }, (_, i) => transient.scoreDrafts?.[i] ?? '');
        }

        const progress = computeTier3Progress(state.records);
        const lastRecord = state.records[0];
        const resultHtml = transient.checkinResult ? `
          <div class="card compact">
            <div class="feedback">
              <strong>本次嘴臭点评</strong>
              ${escapeHtml(transient.checkinResult.summary)}<br />
              <span class="muted">命中率：${transient.checkinResult.hitRateText}</span>
            </div>
          </div>
        ` : '';

        els.checkin.innerHTML = `
          <div class="card">
            <div class="grid-2">
              <div class="stat">
                <div class="label">当前档位</div>
                <div class="value">${tierName(profile.currentTier)}</div>
              </div>
              <div class="stat">
                <div class="label">连续打卡</div>
                <div class="value">${progress.streak} 天</div>
              </div>
            </div>
          </div>

          <div class="card">
            <div class="row" style="align-items:flex-start;">
              <div>
                <div class="label">可练动作</div>
                <div class="hint">当前档位能选的都在这。想练更多，去设置切到二档。</div>
              </div>
              <span class="badge">15球 / 组</span>
            </div>
            <div class="actions-list" style="margin-top:12px;">
              ${actions.map(a => `<span class="chip">${escapeHtml(a.name)}</span>`).join('')}
            </div>
          </div>

          <form class="stack" id="checkinForm">
            <div class="card">
              <div class="field">
                <label class="label" for="actionSelect">动作类型</label>
                <select class="select" id="actionSelect">
                  ${actions.map(a => `<option value="${a.id}" ${a.id === selectedAction ? 'selected' : ''}>${escapeHtml(a.name)}</option>`).join('')}
                </select>
              </div>

              <div class="field" style="margin-top:14px;">
                <label class="label" for="groupCount">组数</label>
                <input class="input" id="groupCount" type="number" inputmode="numeric" min="1" max="20" value="${groupCount}" />
                <div class="hint">每组默认 15 球。组数改了，下方每组进球输入也会跟着变。</div>
              </div>

              <div class="field" style="margin-top:16px;">
                <div class="label">每组进球数</div>
                <div class="score-grid" id="scoreGrid">
                  ${Array.from({ length: groupCount }, (_, idx) => `
                    <div class="score-box">
                      <div class="row">
                        <strong>第 ${idx + 1} 组</strong>
                        <span class="muted">/15</span>
                      </div>
                      <div class="score-input-row">
                        <input type="number" inputmode="numeric" min="0" max="15" step="1" data-score-index="${idx}" value="${escapeHtml(String(transient.scoreDrafts[idx] ?? ''))}" placeholder="0-15" />
                        <button type="button" class="mic-btn" data-mic-index="${idx}" aria-label="语音输入第 ${idx + 1} 组进球数" title="语音输入">🎤</button>
                      </div>
                    </div>
                  `).join('')}
                </div>
              </div>

              <div class="stack" style="margin-top:16px;">
                <button class="btn" type="submit">保存这次打卡</button>
                <button class="btn ghost" type="button" id="fillDemoBtn">给我填个示例</button>
              </div>
            </div>
          </form>

          ${resultHtml}

          <div class="card compact">
            <div class="row" style="align-items:flex-start;">
              <div>
                <div class="label">升三档条件</div>
                <div class="hint">连续 7 天打卡，且这 7 天里每天至少有 1 条二档动作记录，并且每组都 ≥ 10/15。</div>
              </div>
              <span class="badge ${progress.qualifies ? '' : 'warn'}">${progress.qualifies ? '已满足' : `还差 ${Math.max(0, 7 - progress.streak)} 天`}</span>
            </div>
            <div class="note" style="margin-top:12px;">
              三档现在动作列表和二档一致。你先把标准打出来，系统再弹窗提示你上传清蛇彩视频申请审核。审核功能现在只做提示，不真上传。
            </div>
          </div>

          <div class="card compact">

      function getSpeechRecognitionCtor() {
        return window.SpeechRecognition || window.webkitSpeechRecognition || null;
      }

      function startScoreVoiceInput(index) {
        const SpeechRecognitionCtor = getSpeechRecognitionCtor();
        if (!SpeechRecognitionCtor) {
          showToast('当前浏览器不支持语音识别。', true);
          return;
        }

        if (transient.activeRecognition) {
          try {
            transient.activeRecognition.stop();
          } catch (err) {}
        }

        const recognition = new SpeechRecognitionCtor();
        transient.activeRecognition = recognition;
        transient.activeMicIndex = index;

        const micBtn = document.querySelector(`[data-mic-index="${index}"]`);
        if (micBtn) micBtn.classList.add('active');

        recognition.lang = 'zh-CN';
        recognition.interimResults = false;
        recognition.continuous = false;
        recognition.maxAlternatives = 1;

        recognition.onresult = (event) => {
          const transcript = String(event.results?.[0]?.[0]?.transcript || '').trim();
          const parsedScore = parseRecognizedScore(transcript);

          if (Number.isInteger(parsedScore) && parsedScore >= 0 && parsedScore <= 15) {
            transient.scoreDrafts[index] = String(parsedScore);
            const input = document.querySelector(`[data-score-index="${index}"]`);
            if (input) {
              input.value = String(parsedScore);
              input.dispatchEvent(new Event('input', { bubbles: true }));
            }
          } else {
            showToast('没听清数字，再说一次。', true);
          }

          try {
            recognition.stop();
          } catch (err) {}
        };

        recognition.onerror = () => {
          showToast('语音识别失败，请重试。', true);
        };

        recognition.onend = () => {
          if (micBtn) micBtn.classList.remove('active');
          if (transient.activeRecognition === recognition) {
            transient.activeRecognition = null;
            transient.activeMicIndex = null;
          }
        };

        try {
          recognition.start();
        } catch (err) {
          if (micBtn) micBtn.classList.remove('active');
          transient.activeRecognition = null;
          transient.activeMicIndex = null;
          showToast('语音识别启动失败，请重试。', true);
        }
      }

      function parseRecognizedScore(text) {
        const normalized = String(text || '').trim().replace(/\s+/g, '');
        if (!normalized) return null;

        const digitMatch = normalized.match(/\d+/);
        if (digitMatch) {
          const num = Number(digitMatch[0]);
          return Number.isFinite(num) ? num : null;
        }

        const chineseMap = {
          零: 0, 〇: 0,
          一: 1, 二: 2, 两: 2, 三: 3, 四: 4, 五: 5,
          六: 6, 七: 7, 八: 8, 九: 9
        };

        if (normalized === '十') return 10;
        if (normalized === '十五') return 15;
        if (normalized.startsWith('十')) {
          const ones = chineseMap[normalized.slice(1)];
          return typeof ones === 'number' ? 10 + ones : null;
        }
        if (normalized.endsWith('十')) {
          const tens = chineseMap[normalized[0]];
          return typeof tens === 'number' ? tens * 10 : null;
        }
        if (normalized.includes('十')) {
          const [tensChar, onesChar] = normalized.split('十');
          const tens = tensChar ? chineseMap[tensChar] : 1;
          const ones = onesChar ? chineseMap[onesChar] : 0;
          if (typeof tens === 'number' && typeof ones === 'number') return tens * 10 + ones;
        }

        if (Object.prototype.hasOwnProperty.call(chineseMap, normalized)) {
          return chineseMap[normalized];
        }

        const compactDigits = normalized.split('').map(char => chineseMap[char]).join('');
        if (/^\d+$/.test(compactDigits)) {
          const num = Number(compactDigits);
          return Number.isFinite(num) ? num : null;
        }

        return null;
      }

      function submitCheckin() {
        const profile = state.profile;
        const actions = getAvailableActions(profile.currentTier);
        const action = actions.find(a => a.id === transient.selectedAction) || actions[0];
        const groupCount = clamp(Number(transient.groupCount || 1), 1, 20);
        const scores = Array.from({ length: groupCount }, (_, idx) => Number(transient.scoreDrafts[idx]));

        if (!action) {
          showToast('当前档位没有可用动作，离谱了。', true);
          return;
        }

        if (scores.some(score => Number.isNaN(score) || score < 0 || score > 15)) {
          showToast('每组进球数必须是 0 到 15。别给我填 16，袋口没那么大。', true);
          return;
        }

        const avg = average(scores);
        const feedback = feedbackByScore(avg);
        const total = sum(scores);
        const record = {
          id: cryptoId(),
          actionId: action.id,
          actionName: action.name,
          tierSnapshot: profile.currentTier,
          groupCount,
          ballsPerGroup: 15,
          scores,
          feedback,
          createdAt: new Date().toISOString()
        };

        state.records.unshift(record);
        transient.checkinResult = {
          summary: feedback,
          hitRateText: `${total}/${groupCount * 15}（${((total / (groupCount * 15)) * 100).toFixed(1)}%）`
        };
        transient.scoreDrafts = Array.from({ length: groupCount }, () => '');
        saveState();
        renderAll();
        switchTab('checkin');
        showToast('打卡成功。数据已经塞进 localStorage。');
        maybePromptTier3();
      }

      function computeTier3Progress(records) {
        const grouped = groupRecordsByDate(records);
        const dateKeys = Array.from(grouped.keys()).sort().reverse();
        if (!dateKeys.length) return { streak: 0, qualifies: false, qualifyingDays: 0 };

        const streakDates = [dateKeys[0]];
        for (let i = 1; i < dateKeys.length; i += 1) {
          const prev = new Date(`${dateKeys[i - 1]}T00:00:00`);
          const current = new Date(`${dateKeys[i]}T00:00:00`);
          const diff = (prev - current) / 86400000;
          if (diff === 1) {
            streakDates.push(dateKeys[i]);
          } else {
            break;
          }
        }

        const windowDates = streakDates.slice(0, 7);
        const qualifies = windowDates.length === 7 && windowDates.every(dateKey => {
          const dayRecords = grouped.get(dateKey) || [];
          const tier2Records = dayRecords.filter(r => ACTIONS[2].some(a => a.id === r.actionId));
          return tier2Records.length > 0 && tier2Records.every(r => r.scores.every(score => Number(score) >= 10));
        });

        let qualifyingDays = 0;
        for (const dateKey of streakDates) {
          const dayRecords = grouped.get(dateKey) || [];
          const tier2Records = dayRecords.filter(r => ACTIONS[2].some(a => a.id === r.actionId));
          if (tier2Records.length && tier2Records.every(r => r.scores.every(score => Number(score) >= 10))) {
            qualifyingDays += 1;
          } else {
            break;
          }
        }

        return {
          streak: streakDates.length,
          qualifies,
          qualifyingDays
        };
      }

      function groupRecordsByDate(records) {
        const map = new Map();
        records.forEach(record => {
          const key = localDateKey(record.createdAt);
          if (!map.has(key)) map.set(key, []);
          map.get(key).push(record);
        });
        return map;
      }

      function computeStats(records) {
        const totalEntries = records.length;
        const allScores = records.flatMap(r => r.scores || []);
        const totalGroups = allScores.length;
        const totalHits = sum(allScores);
        return {
          totalEntries,
          totalGroups,
          totalHits,
          avgPerGroup: totalGroups ? totalHits / totalGroups : 0
        };
      }

      function getAvailableActions(tier) {
        return ACTIONS[tier] || ACTIONS[1];
      }

      function feedbackByScore(score) {
        const matched = FEEDBACKS.find(item => score >= item.min && score <= item.max);
        return matched ? matched.text : FEEDBACKS[FEEDBACKS.length - 1].text;
      }

              onClick: () => {
                const nicknameEl = document.getElementById('registerNickname');
                const nickname = (nicknameEl?.value || '').trim() || '球桌常驻人口';
                const selectedTier = Number(transient.registerTier || 1);
                state.profile = {
                  nickname,
                  currentTier: selectedTier,
                  tier3Eligible: false,
                  tier3Prompted: false,
                  tier3Approved: false,
                  registeredAt: new Date().toISOString()
                };
                state.records = [];
                state.ui.tab = 'checkin';
                saveState();
                closeModal();
                els.nav.classList.remove('hidden');
                transient.groupCount = 1;
                transient.selectedAction = getAvailableActions(selectedTier)[0]?.id || '';
                transient.scoreDrafts = [''];
                transient.checkinResult = null;
                renderAll();
                switchTab('checkin');
                showToast(`注册完成，当前是 ${tierName(selectedTier)}。先别嘴硬，先练。`);
              }
            }
          ],
          lock: true,
          onMount: () => {
            transient.registerTier = 1;
            document.querySelectorAll('[data-register-tier]').forEach(btn => {
              btn.addEventListener('click', () => {
                transient.registerTier = Number(btn.getAttribute('data-register-tier'));
                document.querySelectorAll('[data-register-tier]').forEach(item => item.classList.remove('active'));
                btn.classList.add('active');
              });
            });
          }
        });
      }

      function openModal({ title, body, content = '', actions = [], lock = false, onMount }) {
        els.modalContent.innerHTML = `
          <h2>${escapeHtml(title)}</h2>
          <p>${body}</p>
          ${content}
          <div class="stack" style="margin-top:18px;">
            ${actions.map((action, idx) => `
              <button class="btn ${action.secondary ? 'secondary' : ''} ${action.danger ? 'danger' : ''}" type="button" data-modal-action="${idx}">${escapeHtml(action.text)}</button>
            `).join('')}
          </div>
        `;
        els.modalMask.classList.add('show');
        els.modalMask.dataset.lock = lock ? '1' : '0';

        els.modalContent.querySelectorAll('[data-modal-action]').forEach(btn => {
          btn.addEventListener('click', () => {
            const action = actions[Number(btn.getAttribute('data-modal-action'))];
            if (action?.onClick) action.onClick();
          });
        });

        if (!lock) {
          els.modalMask.onclick = (e) => {
            if (e.target === els.modalMask) closeModal();
          };
        } else {
          els.modalMask.onclick = null;
        }

        if (typeof onMount === 'function') onMount();
      }

      function closeModal(force = false) {
        if (!force && els.modalMask.dataset.lock === '1') return;
        els.modalMask.classList.remove('show');
        els.modalContent.innerHTML = '';
        els.modalMask.onclick = null;
      }

      function tierName(tier) {
        return `${tier}档${tier === 1 ? '（初学者）' : tier === 2 ? '（进阶）' : '（高阶）'}`;
      }

      function formatDateTime(iso) {
        const date = new Date(iso);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        const h = String(date.getHours()).padStart(2, '0');
        const mm = String(date.getMinutes()).padStart(2, '0');
        return `${y}-${m}-${d} ${h}:${mm}`;
      }

      function localDateKey(input) {
        const date = input instanceof Date ? input : new Date(input);
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      }

      function sum(arr) {
        return (arr || []).reduce((acc, n) => acc + Number(n || 0), 0);
      }

      function average(arr) {
        return arr?.length ? sum(arr) / arr.length : 0;
      }

      function clamp(n, min, max) {
        return Math.min(max, Math.max(min, n));
      }

      function cryptoId() {
        return `rec_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
      }

      function showToast(message, isError = false) {
        els.toast.textContent = message;
        els.toast.style.borderColor = isError ? 'rgba(248,113,113,0.32)' : 'rgba(79,209,197,0.28)';
        els.toast.classList.add('show');
        clearTimeout(showToast._timer);
        showToast._timer = setTimeout(() => {
          els.toast.classList.remove('show');
        }, 2200);
      }

      function escapeHtml(value) {
        return String(value ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && els.modalMask.classList.contains('show') && els.modalMask.dataset.lock !== '1') {
          closeModal();
        }
      });

      // Expose for easy manual debugging in browser console.
      window.billiardApp = {
        state,
        reset: () => localStorage.removeItem(STORAGE_KEY),
        version: '1.1.0'
      };
    })();
  </script>
</body>
</html>
